<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="hero">
            <div>
                <h1>Retirement Simulator</h1>
                <p class="subhead">Monte Carlo testing with Guyton-Klinger guardrails</p>
            </div>
            <button class="run-btn" onclick="runSimulation()">Run Simulation</button>
        </header>

        <main class="layout">
            <section class="card controls">
                <h2>Inputs</h2>
                <p class="helper-note">
                    Typical Guyton-Klinger defaults: 20% upper guardrail, 20% lower guardrail, 10% spending adjustment.
                </p>

                <div class="form-grid">
                    <div class="field field-range">
                        <label for="years">Retirement Period</label>
                        <div class="range-wrap">
                            <input type="range" id="years" min="1" max="40" value="30">
                            <span class="range-value"><span id="yearsValue">30</span> yrs</span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="capital">Initial Capital (£)</label>
                        <input type="number" id="capital" value="1000000">
                    </div>

                    <div class="field">
                        <label for="stocks">Stock Allocation (%)</label>
                        <input type="number" id="stocks" value="100">
                    </div>

                    <div class="field">
                        <label for="bonds">Bond Allocation (%)</label>
                        <input type="number" id="bonds" value="0">
                    </div>

                    <div class="field">
                        <label for="withdrawalRate">Initial Withdrawal Rate (%)</label>
                        <input type="number" id="withdrawalRate" value="4" step="0.1">
                    </div>

                    <div class="field">
                        <label for="upperGuard" class="label-with-help">
                            <span>Upper Guardrail (%)</span>
                            <span
                                class="help"
                                tabindex="0"
                                title="If your withdrawal rate rises this much above the starting rate, spending is reduced. Example: a 4% starting withdrawal with a 20% upper guardrail triggers a cut at 4.8%."
                                aria-label="If your withdrawal rate rises this much above the starting rate, spending is reduced. Example: a 4 percent starting withdrawal with a 20 percent upper guardrail triggers a cut at 4.8 percent."
                            >ⓘ</span>
                        </label>
                        <input type="number" id="upperGuard" value="20">
                    </div>

                    <div class="field">
                        <label for="lowerGuard" class="label-with-help">
                            <span>Lower Guardrail (%)</span>
                            <span
                                class="help"
                                tabindex="0"
                                title="If your withdrawal rate falls this much below the starting rate, spending increases. Example: a 4% starting withdrawal with a 20% lower guardrail triggers an increase at 3.2%."
                                aria-label="If your withdrawal rate falls this much below the starting rate, spending increases. Example: a 4 percent starting withdrawal with a 20 percent lower guardrail triggers an increase at 3.2 percent."
                            >ⓘ</span>
                        </label>
                        <input type="number" id="lowerGuard" value="20">
                    </div>

                    <div class="field">
                        <label for="downAdjust" class="label-with-help">
                            <span>Downward Adjustment (%)</span>
                            <span
                                class="help"
                                tabindex="0"
                                title="The percentage spending cut applied when the upper guardrail is breached. Example: a 10% cut reduces £40,000 spending to £36,000."
                                aria-label="The percentage spending cut applied when the upper guardrail is breached. Example: a 10 percent cut reduces 40 thousand pounds spending to 36 thousand pounds."
                            >ⓘ</span>
                        </label>
                        <input type="number" id="downAdjust" value="10">
                    </div>

                    <div class="field">
                        <label for="upAdjust" class="label-with-help">
                            <span>Upward Adjustment (%)</span>
                            <span
                                class="help"
                                tabindex="0"
                                title="The percentage spending increase applied when the lower guardrail is breached. Example: a 10% increase raises £40,000 spending to £44,000."
                                aria-label="The percentage spending increase applied when the lower guardrail is breached. Example: a 10 percent increase raises 40 thousand pounds spending to 44 thousand pounds."
                            >ⓘ</span>
                        </label>
                        <input type="number" id="upAdjust" value="10">
                    </div>
                </div>
            </section>

            <section class="card chart-card">
                <div class="section-head">
                    <h2>Projection</h2>
                    <p>10th, 50th and 90th percentile portfolio paths</p>
                </div>
                <canvas id="chart" width="1000" height="420"></canvas>
            </section>

            <section class="card summary-card">
                <h2>Monte Carlo Summary</h2>
                <div id="summary"></div>
            </section>
        </main>
    </div>

    <script src="montecarlo.js"></script>
    <script src="guardrails.js"></script>
    <script src="app.js"></script>
</body>
</html>
