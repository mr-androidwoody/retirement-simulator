<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <header class="hero">
            <div>
                <h1>Retirement Simulator</h1>
                <p class="subhead">Monte Carlo testing with Guyton-Klinger guardrails</p>
            </div>
            <button class="run-btn" onclick="runSimulation()">Run Simulation</button>
        </header>

        <main class="layout">
            <section class="card controls">
                <h2>Inputs</h2>

                <div class="form-grid">
                    <div class="field field-range">
                        <label for="years">Retirement Period</label>
                        <div class="range-wrap">
                            <input type="range" id="years" min="1" max="40" value="30" oninput="document.getElementById('yearsValue').textContent = this.value">
                            <span class="range-value"><span id="yearsValue">30</span> yrs</span>
                        </div>
                    </div>

                    <div class="field">
                        <label for="capital">Initial Capital (£)</label>
                        <input type="number" id="capital" value="1000000">
                    </div>

                    <div class="field">
                        <label for="stocks">Stock Allocation (%)</label>
                        <input type="number" id="stocks" value="100">
                    </div>

                    <div class="field">
                        <label for="bonds">Bond Allocation (%)</label>
                        <input type="number" id="bonds" value="0">
                    </div>

                    <div class="field">
                        <label for="withdrawalRate">Initial Withdrawal Rate (%)</label>
                        <input type="number" id="withdrawalRate" value="4" step="0.1">
                    </div>

                    <div class="field">
                        <label for="upperGuard">Upper Guardrail (%)</label>
                        <input type="number" id="upperGuard" value="20">
                    </div>

                    <div class="field">
                        <label for="lowerGuard">Lower Guardrail (%)</label>
                        <input type="number" id="lowerGuard" value="20">
                    </div>

                    <div class="field">
                        <label for="downAdjust">Downward Adjustment (%)</label>
                        <input type="number" id="downAdjust" value="10">
                    </div>

                    <div class="field">
                        <label for="upAdjust">Upward Adjustment (%)</label>
                        <input type="number" id="upAdjust" value="10">
                    </div>
                </div>
            </section>

            <section class="card chart-card">
                <div class="section-head">
                    <h2>Projection</h2>
                    <p>10th, 50th and 90th percentile portfolio paths</p>
                </div>
                <canvas id="chart" width="1000" height="500"></canvas>
            </section>

            <section class="card summary-card">
                <h2>Monte Carlo Summary</h2>
                <div id="summary"></div>
            </section>
        </main>
    </div>

    <script src="montecarlo.js"></script>
    <script src="guardrails.js"></script>
    <script src="app.js"></script>
</body>
</html>
